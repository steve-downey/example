name: Weekly pre-commit autoupdate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * 0"

permissions:
  contents: read

jobs:
  auto-update-pre-commit:
    uses: bemanproject/infra-workflows/.github/workflows/reusable-beman-update-pre-commit.yml@aff2108f4f48fd423d2f1e9d3cf7dae9f46112fe # ratchet:bemanproject/infra-workflows/.github/workflows/reusable-beman-update-pre-commit.yml@1.6.0
    permissions:
      checks: write
      issues: write
      pull-requests: write
    secrets:
      APP_ID: ${{ secrets.AUTO_PR_BOT_APP_ID }}
      PRIVATE_KEY: ${{ secrets.AUTO_PR_BOT_PRIVATE_KEY }}
