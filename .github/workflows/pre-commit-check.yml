name: Lint Check (pre-commit)

on:
  # We have to use pull_request_target here as pull_request does not grant
  # enough permission for reviewdog
  pull_request_target:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pre-commit:
    permissions:
      contents: read
      checks: write
      issues: write
      pull-requests: write
    uses: bemanproject/infra-workflows/.github/workflows/reusable-beman-pre-commit.yml@82c1c6c07039084f047e56ef806612b9e2fa45cf # ratchet:bemanproject/infra-workflows/.github/workflows/reusable-beman-pre-commit.yml@1.5.0
